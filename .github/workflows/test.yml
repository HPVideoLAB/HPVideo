name: Test & Lint

on:
  pull_request:
    branches: [main, test]
  push:
    branches: [main, test]

jobs:
  lint-python:
    name: Python syntax + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install lint tools
        run: pip install ruff
      - name: Ruff check (syntax + common errors)
        # E9/F63/F7/F82 only — fail on real bugs, not style nits.
        run: |
          ruff check backend/ \
            --select E9,F63,F7,F82 \
            --exit-non-zero-on-fix

  lint-frontend:
    name: Frontend type/syntax check (advisory)
    runs-on: ubuntu-latest
    # Why advisory: the Svelte studio was forked from open-webui and
    # carries ~1044 legacy svelte-check errors (most are TS strictness
    # complaints in dynamic-typed code, e.g. "'ctx' is possibly null",
    # "Property 'childrenIds' does not exist on type 'never'"). Fixing
    # them is a multi-day cleanup, not something to gate every PR on.
    # Keep the job so regressions are still visible in logs, but don't
    # block merges on a baseline that pre-dates this CI file. Re-flip
    # to a hard gate after the legacy backlog is triaged.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps
        run: npm ci --ignore-scripts || npm install --ignore-scripts
      - name: Svelte/TypeScript check
        run: |
          if grep -q '"check"' package.json; then
            npm run check
          else
            echo "No check script defined; skipping."
          fi

  test-python:
    name: Python unit tests (if any)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install deps
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio
      - name: Smoke-import the FastAPI app
        # Catches ImportError / NameError that crashes the app at startup.
        # Why this exists: v22 shipped with `from utils.utils import
        # parse_duration` (it's actually in utils.misc) and took prod down
        # for ~1 hour because nothing exercised the import path before
        # k8s rolled the pod. A bare `import` is enough to detect this
        # class of regression — we don't need a running server.
        env:
          DATABASE_URL: 'sqlite:///:memory:'
          WEBUI_SECRET_KEY: 'ci-smoke-test-secret-not-used-in-prod-please'
          WALLET_DERIVATION_SECRET: 'ci-smoke-test-wallet-secret-not-used-in-prod'
          DATA_DIR: '/tmp/hpv-ci-data'
          DISABLE_METRICS: '1'
        run: |
          mkdir -p /tmp/hpv-ci-data
          cd backend
          python -c "from apps.web.main import app; print(f'OK: {len(app.routes)} routes loaded')"
      - name: Run pytest if tests exist
        run: |
          if compgen -G 'backend/tests/**/*.py' > /dev/null || \
             compgen -G 'backend/**/test_*.py' > /dev/null; then
            pytest backend/ -x --tb=short
          else
            echo "No tests found; skipping pytest."
          fi
